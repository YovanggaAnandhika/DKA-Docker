name: dka-database

services:
  mariadb:
    image: yovanggaanandhika/mariadb:latest
    container_name: dka-database-mariadb
    hostname: dka-database-mariadb
    restart: always
    environment:
      DKA_ROOT_PASSWORD: Cyberhack2010
      DKA_DB_NAME: dka
      DKA_DB_USERNAME: dka
      DKA_DB_PASSWORD: Cyberhack2010
      DKA_CRON_ENABLE: true
      DKA_CRON_PRIODIC: "0 3 * * *"
      # S3 / Wasabi upload configuration
      DKA_S3_UPLOAD_ENABLE: true
      DKA_S3_BUCKET: my-wasabi-bucket
      DKA_S3_PATH: backups/mariadb
      DKA_S3_ENDPOINT: https://s3.ap-southeast-1.wasabisys.com
      DKA_S3_REGION: ap-southeast-1
      AWS_ACCESS_KEY_ID: your_access_key
      AWS_SECRET_ACCESS_KEY: your_secret_key
      # Auto maintenance
      DKA_MAINTENANCE_ENABLE: true
      DKA_MAINTENANCE_CRON: "0 4 * * *"
      DKA_MAINTENANCE_LOG: /var/log/mysql/maintenance.log
    ports:
      - target: 3306
        published: 3306
        protocol: tcp
        host_ip: 0.0.0.0
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'
        reservations:
          memory: 500M
          cpus: '0.8'
    volumes:
      - type: volume
        source: data
        target: /var/lib/mysql
      - type: volume
        source: backup
        target: /backup
    networks:
      - default

volumes:
  data:
    driver: local
  backup:
    driver: local

networks:
  default:
    driver: bridge
